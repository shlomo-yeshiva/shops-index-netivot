<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>פרטי עסק - אינדקס נתיבות</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .detail-image { max-height: 280px; object-fit: cover; }
    .img-placeholder { height: 200px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #92400e; }
  </style>
</head>
<body class="bg-amber-50 min-h-screen">
  <div class="max-w-3xl mx-auto p-4 md:p-6">
    <a href="/" class="inline-block text-amber-600 hover:text-amber-800 mb-6 font-medium">← חזרה לאינדקס</a>
    <div id="loading" class="text-center py-12 text-amber-700">טוען פרטים...</div>
    <div id="error" class="hidden bg-red-50 border border-red-200 text-red-800 rounded-xl p-6"></div>
    <div id="detail" class="hidden bg-white rounded-xl shadow-lg overflow-hidden border border-amber-200"></div>
  </div>
  <script>
    (async function() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').textContent = 'חנות לא נמצאה';
        document.getElementById('error').classList.remove('hidden');
        return;
      }
      function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
      try {
        const res = await fetch('/api/shops/' + id);
        if (!res.ok) throw new Error('חנות לא נמצאה');
        const s = await res.json();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('detail').classList.remove('hidden');
        const mapsUrl = 'https://www.google.com/maps?q=' + (s.lat || 31.42) + ',' + (s.lng || 34.59);
        const imgBlock = s.image
          ? '<img src="' + esc(s.image) + '" alt="" class="detail-image w-full">'
          : '<div class="img-placeholder">🏪</div>';
        document.getElementById('detail').innerHTML = `
          <div class="w-full">${imgBlock}</div>
          <div class="p-6 md:p-8">
            <h1 class="text-2xl md:text-3xl font-bold text-amber-900 mb-2">${esc(s.name)}</h1>
            ${s.category ? '<span class="inline-block mb-4 px-3 py-1 bg-amber-200 text-amber-900 rounded-full text-sm font-medium">' + esc(s.category) + '</span>' : ''}
            <div class="space-y-4 text-gray-700 mt-4">
              ${s.address ? '<p class="flex items-start gap-2"><span>📍</span> <span>' + esc(s.address) + '</span></p>' : ''}
              ${s.openingHours ? '<p class="flex items-start gap-2"><span>🕐</span> <span>' + esc(s.openingHours) + '</span></p>' : ''}
              ${s.phone ? '<p class="flex items-center gap-2"><span>📞</span> <a href="tel:' + esc(s.phone) + '" class="text-amber-600 hover:underline font-medium">' + esc(s.phone) + '</a></p>' : ''}
              <p class="flex items-center gap-2 pt-4">
                <a href="${mapsUrl}" target="_blank" rel="noopener" class="px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 font-medium">📍 הצג במפה</a>
              </p>
            </div>
            <div class="mt-8 pt-6 border-t border-amber-200">
              <h3 class="font-bold text-amber-900 mb-2">הוסף תמונת עסק</h3>
              <p class="text-sm text-gray-600 mb-2">הדבק קישור לתמונה (URL)</p>
              <div class="flex gap-2">
                <input type="url" id="imageUrl" placeholder="https://..." class="flex-1 px-4 py-2 border border-amber-300 rounded-lg">
                <button onclick="saveImage('${id}')" class="px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 font-medium">שמור</button>
              </div>
              <p id="imageMsg" class="text-sm mt-2 hidden"></p>
            </div>
          </div>
        `;
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').textContent = '⚠️ ' + e.message;
        document.getElementById('error').classList.remove('hidden');
      }
    })();
    async function saveImage(id) {
      const url = document.getElementById('imageUrl').value.trim();
      const msg = document.getElementById('imageMsg');
      if (!url) { msg.textContent = 'נא להזין קישור לתמונה'; msg.classList.remove('hidden'); msg.classList.add('text-amber-700'); return; }
      try {
        const res = await fetch('/api/shops/' + id, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: url })
        });
        if (!res.ok) throw new Error('שגיאה בשמירה');
        msg.textContent = '✓ התמונה נשמרה בהצלחה';
        msg.classList.remove('hidden', 'text-red-600');
        msg.classList.add('text-green-700');
        setTimeout(() => location.reload(), 800);
      } catch (e) {
        msg.textContent = '⚠️ ' + e.message;
        msg.classList.remove('hidden', 'text-green-700');
        msg.classList.add('text-red-600');
      }
    }
  </script>
</body>
</html>
