<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>אינדקס חנויות נתיבות - דפי זהב</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card-image { height: 140px; object-fit: cover; }
    .placeholder-img { height: 140px; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); display: flex; align-items: center; justify-content: center; color: #92400e; font-size: 2.5rem; }
  </style>
</head>
<body class="bg-amber-50/50 min-h-screen">
  <header class="bg-amber-500 border-b-4 border-amber-700 shadow-lg">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <h1 class="text-2xl md:text-3xl font-black text-amber-900">📒 אינדקס חנויות נתיבות</h1>
      <p class="text-amber-900/80 text-sm mt-1">דפי זהב - עסקים וחנויות בנתיבות</p>
    </div>
  </header>
  <main class="max-w-5xl mx-auto px-4 py-6">
    <section class="bg-amber-100 border-2 border-amber-300 rounded-xl p-4 md:p-6 mb-6 shadow-md">
      <h2 class="text-lg font-bold text-amber-900 mb-3">🔍 חיפוש חכם</h2>
      <p class="text-amber-800/80 text-sm mb-3">הקלד מילים (למשל: מכולת ירושלים) - החיפוש ימצא עסקים שמכילים את כל המילים</p>
      <div class="flex flex-col gap-3">
        <input type="text" id="search" placeholder="חפש לפי שם, כתובת או קטגוריה..." 
          class="w-full px-4 py-3 border-2 border-amber-400 rounded-lg bg-white text-amber-900 placeholder-amber-600/60">
        <div>
          <label for="category" class="block text-sm font-semibold text-amber-900 mb-1">קטגוריה</label>
          <select id="category" class="w-full px-4 py-3 border-2 border-amber-400 rounded-lg bg-white text-amber-900">
            <option value="">כל הקטגוריות</option>
          </select>
        </div>
        <button onclick="loadShops()" class="px-6 py-3 bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-lg shadow">חפש</button>
      </div>
    </section>
    <div id="loading" class="text-center py-12 text-amber-800">טוען חנויות...</div>
    <div id="error" class="hidden bg-red-50 border-2 border-red-200 text-red-800 rounded-xl p-6 mb-6"></div>
    <div id="list" class="space-y-4"></div>
  </main>
  <script>
    const categories = ['מכולת וסופר','מאפיות','מסעדות','חלבי','בשרי','פירות וירקות','קיוסק','אוכל מוכן','בנקים','ביגוד','הנעלה','רהיטים','אולמות','תשמישי קדושה','תכשיטים ושעונים','כלי בית','תאורה','חשמל ואלקטרוניקה','חומרי בניין','טיפוח','אופטיקה','כלי כתיבה','ספרים','צעצועים','מוסך','מכירת רכבים','אופניים וציוד נלווה','בתי כנסת','מגרשים','בתי מרקחת','קופות חולים'].sort();
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      document.getElementById('category').appendChild(opt);
    });

    let searchTimeout;
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(loadShops, 300);
    });
    document.getElementById('category').addEventListener('change', loadShops);

    async function loadShops() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('list').innerHTML = '';
      try {
        const q = document.getElementById('search').value.trim();
        const cat = document.getElementById('category').value;
        let url = '/api/shops?';
        if (q) url += 'query=' + encodeURIComponent(q) + '&';
        if (cat) url += 'category=' + encodeURIComponent(cat);
        const res = await fetch(url);
        if (!res.ok) throw new Error('שגיאה בטעינה');
        const shops = await res.json();
        document.getElementById('loading').classList.add('hidden');
        if (shops.length === 0) {
          document.getElementById('list').innerHTML = '<p class="text-center text-amber-800 py-8">לא נמצאו עסקים.</p>';
          return;
        }
        shops.forEach(s => {
          const card = document.createElement('a');
          card.href = 'shop.html?id=' + encodeURIComponent(s._id);
          card.target = '_blank';
          card.className = 'block bg-white rounded-xl shadow-lg hover:shadow-xl transition overflow-hidden border border-amber-200';
          const imgPlaceholder = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="192" height="140" viewBox="0 0 192 140"><rect fill="#fef3c7" width="192" height="140"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="48" fill="#92400e">🏪</text></svg>');
          const imgHtml = s.image
            ? '<img src="' + escapeHtml(s.image) + '" alt="" class="card-image w-full object-cover" onerror="this.src=\'' + imgPlaceholder + '\'">'
            : '<div class="placeholder-img">🏪</div>';
          card.innerHTML = `
            <div class="flex flex-col sm:flex-row">
              <div class="sm:w-48 flex-shrink-0">${imgHtml}</div>
              <div class="flex-1 p-4 sm:p-6">
                <h3 class="text-xl font-bold text-amber-900">${escapeHtml(s.name)}</h3>
                <span class="inline-block mt-2 px-3 py-1 bg-amber-200 text-amber-900 rounded-full text-sm font-medium">${escapeHtml(s.category || '')}</span>
                <p class="mt-3 text-gray-700">📍 ${escapeHtml(s.address || '')}</p>
                ${s.openingHours ? '<p class="text-gray-600 text-sm">🕐 ' + escapeHtml(s.openingHours) + '</p>' : ''}
                ${s.phone ? '<p class="text-amber-700 font-medium">📞 ' + escapeHtml(s.phone) + '</p>' : ''}
                <p class="mt-3 text-amber-600 text-sm font-medium">לפרטים מלאים ←</p>
              </div>
            </div>
          `;
          document.getElementById('list').appendChild(card);
        });
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').textContent = '⚠️ ' + e.message;
        document.getElementById('error').classList.remove('hidden');
      }
    }

    function escapeHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    document.getElementById('search').onkeypress = e => { if (e.key === 'Enter') loadShops(); };
    loadShops();
  </script>
</body>
</html>
