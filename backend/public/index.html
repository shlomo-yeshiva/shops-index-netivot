<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>אינדקס חנויות נתיבות</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-amber-900 mb-6">🏪 אינדקס חנויות נתיבות</h1>
    <div class="bg-white rounded-xl shadow-md p-6 mb-8">
      <h2 class="text-xl font-bold text-amber-800 mb-4">🔍 חיפוש</h2>
      <div class="flex flex-col gap-3">
        <input type="text" id="search" placeholder="חפש לפי שם או כתובת..." 
          class="w-full px-4 py-3 border border-amber-200 rounded-lg">
        <div>
          <label for="category" class="block text-sm font-semibold text-amber-800 mb-1">קטגוריות</label>
          <select id="category" class="w-full px-4 py-3 border-2 border-amber-300 rounded-lg bg-white text-amber-900 min-h-[48px]">
            <option value="">כל הקטגוריות</option>
          </select>
        </div>
        <button onclick="loadShops()" class="px-6 py-3 bg-amber-600 text-white rounded-lg font-semibold">חפש</button>
      </div>
    </div>
    <div id="loading" class="text-center py-12 text-amber-700">טוען חנויות...</div>
    <div id="error" class="hidden bg-red-50 border border-red-200 text-red-800 rounded-xl p-6 mb-6"></div>
    <div id="list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>
  <script>
    const categories = ['מכולת וסופר','מאפיות','מסעדות','חלבי','בשרי','פירות וירקות','קיוסק','אוכל מוכן','בנקים','ביגוד','הנעלה','רהיטים','אולמות','תשמישי קדושה','תכשיטים ושעונים','כלי בית','תאורה','חשמל ואלקטרוניקה','חומרי בניין','טיפוח','אופטיקה','כלי כתיבה','ספרים','צעצועים','מוסך','מכירת רכבים','אופניים וציוד נלווה','בתי כנסת','מגרשים','בתי מרקחת','קופות חולים'].sort();
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      document.getElementById('category').appendChild(opt);
    });
    async function loadShops() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('list').innerHTML = '';
      try {
        const q = document.getElementById('search').value;
        const cat = document.getElementById('category').value;
        let url = '/api/shops?';
        if (q) url += 'query=' + encodeURIComponent(q) + '&';
        if (cat) url += 'category=' + encodeURIComponent(cat);
        const res = await fetch(url);
        if (!res.ok) throw new Error('שגיאה בטעינה');
        const shops = await res.json();
        document.getElementById('loading').classList.add('hidden');
        if (shops.length === 0) {
          document.getElementById('list').innerHTML = '<p class="col-span-full text-center text-amber-800">לא נמצאו חנויות.</p>';
          return;
        }
        shops.forEach(s => {
          const card = document.createElement('a');
          card.href = 'shop.html?id=' + encodeURIComponent(s._id);
          card.target = '_blank';
          card.className = 'block bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition cursor-pointer';
          card.innerHTML = `
            <h3 class="text-lg font-bold text-amber-900">${escapeHtml(s.name)}</h3>
            <span class="inline-block mt-2 px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-sm">${escapeHtml(s.category || '')}</span>
            <p class="mt-3 text-gray-600">📍 ${escapeHtml(s.address || '')}</p>
            ${s.openingHours ? '<p class="text-gray-600">🕐 ' + escapeHtml(s.openingHours) + '</p>' : ''}
            ${s.phone ? '<p class="text-amber-600">📞 ' + escapeHtml(s.phone) + '</p>' : ''}
            <p class="mt-3 text-sm text-amber-600 font-medium">לפרטים מלאים ←</p>
          `;
          document.getElementById('list').appendChild(card);
        });
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').textContent = '⚠️ ' + e.message;
        document.getElementById('error').classList.remove('hidden');
      }
    }
    function escapeHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    document.getElementById('search').onkeypress = e => { if (e.key === 'Enter') loadShops(); };
    loadShops();
  </script>
</body>
</html>
